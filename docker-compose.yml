

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnia-postgres
    environment:
      POSTGRES_USER: learnia_user
      POSTGRES_PASSWORD: learnia_pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/docker/postgres:/docker-entrypoint-initdb.d
    networks:
      - learnia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnia_user -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: learnia-redis
    ports:
      - "6379:6379"
    networks:
      - learnia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: learnia-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Services
  eureka:
    build:
      context: ./spring-boot-services
      dockerfile: Dockerfile.eureka
    container_name: learnia-eureka
    ports:
      - "8761:8761"
    networks:
      - learnia-net
      
  gateway:
    build:
      context: ./spring-boot-services
      dockerfile: Dockerfile.gateway
    container_name: learnia-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - learnia-net
      
  auth-service:
    build:
      context: ./spring-boot-services
      dockerfile: Dockerfile.auth
    container_name: learnia-auth-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka
      - postgres
    environment:
      DB_USERNAME: learnia_user
      DB_PASSWORD: learnia_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      EUREKA_CLIENT_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - learnia-net
      
  user-service:
    build:
      context: ./spring-boot-services
      dockerfile: Dockerfile.user
    container_name: learnia-user-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka
      - postgres
    environment:
      DB_USERNAME: learnia_user
      DB_PASSWORD: learnia_pass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      EUREKA_CLIENT_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - learnia-net

networks:
  learnia-net:
    driver: bridge

volumes:
  postgres_data:
