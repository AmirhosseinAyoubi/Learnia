# Build image: docker build -f spring-boot-services/Dockerfile.eureka spring-boot-services/ -t <registry>/learnia/eureka:latest
# Push to Rahti internal registry or external registry, then update 'image' below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: learnia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: image-registry.openshift-image-registry.svc:5000/learnia/eureka:latest
          ports:
            - containerPort: 8761
          env:
            - name: EUREKA_INSTANCE_HOSTNAME
              value: eureka
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: learnia
spec:
  selector:
    app: eureka
  ports:
    - port: 8761
      targetPort: 8761
