server:
  port: 8080

spring:
  application:
    name: learnia-gateway
  cloud:
    gateway:
      routes:
        # Spring Boot Services
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: lb://LEARNIA-USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
        - id: course-service
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/v1/courses/**
        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/api/v1/documents/**
        # Python Services (Assume running on host machine)
        - id: processing-service
          uri: http://host.docker.internal:8001
          predicates:
            - Path=/api/v1/processing/**
        - id: content-service
          uri: http://host.docker.internal:8002
          predicates:
            - Path=/api/v1/content/**
        - id: ai-service
          uri: http://host.docker.internal:8003
          predicates:
            - Path=/api/v1/ai/**
        - id: question-service
          uri: http://host.docker.internal:8004
          predicates:
            - Path=/api/v1/questions/**
        - id: quiz-service
          uri: http://host.docker.internal:8005
          predicates:
            - Path=/api/v1/quizzes/**
      default-filters:
        - StripPrefix=0
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
