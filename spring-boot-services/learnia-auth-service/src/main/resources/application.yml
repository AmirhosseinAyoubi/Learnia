spring:
  application:
    name: auth-service

  # Disable config server until it's running
  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/learnia_auth_db
    username: ${DB_USERNAME:learnia_user}
    password: ${DB_PASSWORD:learnia_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: false

server:
  port: 8081

eureka:
  client:
    enabled: false   # also disable Eureka until it's running
    service-url:
      defaultZone: http://localhost:8761/eureka/

# JWT configuration
# In production, override JWT_SECRET with a strong random secret (>= 32 chars)
jwt:
  secret: ${JWT_SECRET:learnia-dev-jwt-secret-32chars-min!!}
  access-token-ttl-minutes: 15

# CORS: comma-separated list of allowed origins
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

